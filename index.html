<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinigami Cyberpunk</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="sidebar"></div>

  <main class="content">
    <h1 class="glow">⚔️ SHINIGAMI SYSTEM</h1>
    <p class="subtitle">Cyberpunk Automation Interface</p>

    <div class="hud">

  <div class="panel status">
    <h3>ENGINE</h3>
    <p class="active">ACTIVE</p>

    <h3>SECURITY</h3>
    <p class="warning">MONITORING</p>
  </div>

  <div class="speed-box">
    <h1 id="speed">0</h1>
    <span>KM/H</span>
  </div>

  <div class="panel status">
    <h3>AI SYSTEM</h3>
    <p class="active">ONLINE</p>

    <h3>NETWORK</h3>
    <p class="active">CONNECTED</p>
  </div>

</div>
  <script src="js/sidebar.js"></script>
</body>
</html>
